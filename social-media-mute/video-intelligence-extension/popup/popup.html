<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Intelligence</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    h2 {
      margin: 0 0 16px 0;
      font-size: 18px;
      font-weight: 600;
    }
    
    p {
      margin: 0 0 12px 0;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.9;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.2);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .status-item:last-child {
      margin-bottom: 0;
    }
    
    .badge {
      background: rgba(255, 255, 255, 0.3);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
    }
    
    .info {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    a {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>📝 Video Intelligence</h2>
  <p>视频智能笔记助手</p>
  
  <div class="status">
    <div class="status-item">
      <span>YouTube 支持</span>
      <span class="badge">✓ 已启用</span>
    </div>
    <div class="status-item">
      <span>B站 支持</span>
      <span class="badge">✓ 已启用</span>
    </div>
    <div class="status-item">
      <span>Ollama 状态</span>
      <span class="badge" id="ollama-status">检测中...</span>
    </div>
  </div>
  
  <p>💡 <strong>使用方法：</strong></p>
  <p>打开 YouTube 或 B站 视频，侧边栏会自动显示智能笔记。</p>
  
  <div class="info">
    <p>Version 1.0.0 | <a href="#" id="help">使用帮助</a></p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
